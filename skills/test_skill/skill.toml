name = "test_skill"
version = "1.0.0"
description = "Agent-safe text processor. No filesystem access. Demonstrates bounded, scoped, predictable CLI patterns."

[runtime]
entrypoint = "test_skill.py"
timeout_secs = 30
max_output_bytes = 65536

[inputs]

[inputs.action]
type = "string"
flag = "--action"
required = true
description = "Text operation to perform"
enum = ["echo", "count", "transform", "extract", "compare"]

[inputs.input]
type = "string"
flag = "--input"
required = true
description = "Input text to process"
max_length = 5000

[inputs.second]
type = "string"
flag = "--second"
required = false
description = "Second input for compare action"
max_length = 5000

[inputs.limit]
type = "integer"
flag = "--limit"
required = false
description = "Max chars/words/lines to return (1-1000)"
default = 100

[inputs.transform]
type = "string"
flag = "--transform"
required = false
description = "Transformation to apply"
enum = ["upper", "lower", "reverse", "trim", "slugify"]
default = "upper"

[inputs.scope]
type = "string"
flag = "--scope"
required = false
description = "Operation scope (cache/namespace isolation)"
default = "default"
pattern = "^[a-z0-9_\\-]+$"
max_length = 50

[inputs.dry_run]
type = "boolean"
flag = "--dry-run"
required = false
description = "Preview what would happen (no actual processing)"
default = false

[inputs.verbose]
type = "boolean"
flag = "--verbose"
required = false
description = "Include debug info in output"
default = false
