name = "test_skill"
description = "Agent-safe text processor. No filesystem access. Demonstrates bounded, scoped, predictable CLI patterns."

[runtime]
entrypoint = "test_skill.py"
timeout_secs = 30

[inputs.action]
type = "string"
flag = "--action"
required = true
description = "Text operation to perform (echo, count, transform, extract, compare)"

[inputs.input]
type = "string"
flag = "--input"
required = true
description = "Input text to process"

[inputs.second]
type = "string"
flag = "--second"
required = false
description = "Second input for compare action"

[inputs.limit]
type = "integer"
flag = "--limit"
required = false
description = "Max chars/words/lines to return (1-1000)"
default = 100

[inputs.transform]
type = "string"
flag = "--transform"
required = false
description = "Transformation to apply (upper, lower, reverse, trim, slugify)"
default = "upper"

[inputs.scope]
type = "string"
flag = "--scope"
required = false
description = "Operation scope (cache/namespace isolation)"
default = "default"

[inputs.dry_run]
type = "boolean"
flag = "--dry-run"
required = false
description = "Preview what would happen"

[inputs.verbose]
type = "boolean"
flag = "--verbose"
required = false
description = "Include debug info"
